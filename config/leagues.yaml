# Trismegistus league configuration
# ---------------------------------
# max_active_leagues: soft cap — enable only what you need (5 active + room for 3-5 more)
# To add a league: copy a block below, set code from football-data.co.uk, enabled: true
# League codes reference: https://www.football-data.co.uk/data.php

max_active_leagues: 10

season: "2526"

# Optional extra seasons for deeper history (free CSVs, same source)
# Phase 6E: expanded to 4 prior seasons (~9k Big 5 completed matches)
historical_seasons:
  - "2425"
  - "2324"
  - "2223"
  - "2122"

fixtures_url: "https://www.football-data.co.uk/fixtures.csv"

# Phase 6F: secondary xG enrichment (StatsBomb open data + FBref when reachable)
enrichment:
  xg_source_priority:
    - understat
    - statsbomb
    - fbref

# Tuned on league holdout via scripts/tune_blend.py (override with BOOKIE_BLEND_WEIGHT env)
model:
  devig_method: shin
  dixon_coles_blend_weight: 0.1
  kelly_fraction: 0.25
  bookie_blend_weight: 0.1
  # Min edge vs bookie implied prob to emit a pick (Phase 2 selective betting)
  per_league_blend:
    D1: 0.6
    E0: 0.25
    F1: 1.0
    I1: 0.0
    SP1: 0.55
  per_league_edge_margin:
    D1: 0.03
    E0: 0.13
    F1: 0.1
    I1: 0.15
    SP1: 0.07
  edge_margin_min: 0.1

# Phase 5B: intel policy (news/reddit/youtube live-only; disabled in train by default)
chaos:
  use_intel_in_train: false
  pit_cache_intel: true

leagues:
  # --- Active (Big 5) ---
  Premier League:
    code: E0
    country: ENG
    enabled: true
  La Liga:
    code: SP1
    country: ESP
    enabled: true
  Bundesliga:
    code: D1
    country: GER
    enabled: true
  Serie A:
    code: I1
    country: ITA
    enabled: true
  Ligue 1:
    code: F1
    country: FRA
    enabled: true

  # --- Ready to enable (toggle enabled: true) ---
  Championship:
    code: E1
    country: ENG
    enabled: false
  League One:
    code: E2
    country: ENG
    enabled: false
  League Two:
    code: E3
    country: ENG
    enabled: false
  Eredivisie:
    code: N1
    country: NED
    enabled: false
  Primeira Liga:
    code: P1
    country: POR
    enabled: false
  Belgian Pro League:
    code: B1
    country: BEL
    enabled: false
  Turkish Super Lig:
    code: T1
    country: TUR
    enabled: false
  Scottish Premiership:
    code: SC0
    country: SCO
    enabled: false
  Greek Super League:
    code: G1
    country: GRE
    enabled: false

# Phase 6B: OddsPortal scrape targets for live Big 5 odds (Scrapling)
oddsportal:
  E0:
    fixtures_url: "https://www.oddsportal.com/football/england/premier-league/"
    results_url: "https://www.oddsportal.com/football/england/premier-league/results/"
  SP1:
    fixtures_url: "https://www.oddsportal.com/football/spain/laliga/"
    results_url: "https://www.oddsportal.com/football/spain/laliga/results/"
  D1:
    fixtures_url: "https://www.oddsportal.com/football/germany/bundesliga/"
    results_url: "https://www.oddsportal.com/football/germany/bundesliga/results/"
  I1:
    fixtures_url: "https://www.oddsportal.com/football/italy/serie-a/"
    results_url: "https://www.oddsportal.com/football/italy/serie-a/results/"
  F1:
