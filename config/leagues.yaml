# Trismegistus league configuration
# ---------------------------------
# max_active_leagues: soft cap — enable only what you need (5 active + room for 3-5 more)
# To add a league: copy a block below, set code from football-data.co.uk, enabled: true
# League codes reference: https://www.football-data.co.uk/data.php

max_active_leagues: 10

season: "2526"

# Optional extra seasons for deeper history (free CSVs, same source)
historical_seasons:
  - "2425"

fixtures_url: "https://www.football-data.co.uk/fixtures.csv"

# Tuned on league holdout via scripts/tune_blend.py (override with BOOKIE_BLEND_WEIGHT env)
model:
  devig_method: shin
  dixon_coles_blend_weight: 0.05
  kelly_fraction: 0.25
  bookie_blend_weight: 0.1
  # Min edge vs bookie implied prob to emit a pick (Phase 2 selective betting)
  per_league_blend:
    D1: 0.6
    E0: 0.25
    F1: 1.0
    I1: 0.0
    SP1: 0.55
  edge_margin_min: 0.1

# Phase 5B: intel policy (news/reddit/youtube live-only; disabled in train by default)
chaos:
  use_intel_in_train: false
  pit_cache_intel: true

leagues:
  # --- Active (Big 5) ---
  Premier League:
    code: E0
    country: ENG
    enabled: true
  La Liga:
    code: SP1
    country: ESP
    enabled: true
  Bundesliga:
    code: D1
    country: GER
    enabled: true
  Serie A:
    code: I1
    country: ITA
    enabled: true
  Ligue 1:
    code: F1
    country: FRA
    enabled: true

  # --- Ready to enable (toggle enabled: true) ---
  Championship:
    code: E1
    country: ENG
    enabled: false
  League One:
    code: E2
    country: ENG
    enabled: false
  League Two:
